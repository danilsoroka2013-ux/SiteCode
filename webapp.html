<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Магазин карт</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        h1 {
            text-align: center;
            color: white;
            margin-bottom: 10px;
            font-size: 2em;
        }
        
        .update-info {
            text-align: center;
            color: rgba(255,255,255,0.9);
            margin-bottom: 20px;
            font-size: 0.9em;
        }
        
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .card:hover {
            transform: translateY(-3px);
        }
        
        .card-image {
            width: 100%;
            height: 180px;
            object-fit: cover;
            background: #ddd;
        }
        
        .card-info {
            padding: 15px;
        }
        
        .card-name {
            font-size: 1.2em;
            font-weight: bold;
            margin-bottom: 5px;
            color: #333;
        }
        
        .card-rarity {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 0.75em;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .rarity-Common { background: #e0e0e0; color: #666; }
        .rarity-Uncommon { background: #4caf50; color: white; }
        .rarity-Rare { background: #2196f3; color: white; }
        .rarity-Epic { background: #9c27b0; color: white; }
        .rarity-Arcane { background: #ff9800; color: white; }
        .rarity-Legendary { background: #f44336; color: white; }
        .rarity-Mythic { background: #e91e63; color: white; }
        .rarity-Godest { background: linear-gradient(135deg, #ffd700, #ff8c00); color: white; }
        .rarity-Secret { background: #000; color: #ffd700; }
        
        .card-description {
            color: #666;
            font-size: 0.85em;
            margin-bottom: 10px;
            line-height: 1.3;
        }
        
        .card-price {
            font-size: 1.1em;
            font-weight: bold;
            color: #4caf50;
        }
        
        .buy-button {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 8px;
            font-size: 0.9em;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }
        
        .balance {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.9em;
        }
        
        .loading {
            text-align: center;
            color: white;
            padding: 40px;
            font-size: 1.2em;
        }
        
        @media (max-width: 768px) {
            .cards-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🃏 Магазин карт</h1>
        <div class="update-info">📅 Обновление раз в неделю | Нажмите на карту для покупки</div>
        <div class="cards-grid" id="cardsGrid">
            <div class="loading">🔄 Загрузка карт...</div>
        </div>
    </div>
    <div class="balance" id="balance">💰 Загрузка...</div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        
        let isLoading = false;
        
        // Загрузка карт при открытии
        function loadCards() {
            if (isLoading) return;
            isLoading = true;
            tg.sendData(JSON.stringify({action: 'get_shop_cards'}));
        }
        
        // Загрузка баланса
        function loadBalance() {
            tg.sendData(JSON.stringify({action: 'get_balance'}));
        }
        
        // Покупка карты
        function buyCard(cardId, cardName, price) {
            tg.showPopup({
                title: 'Подтверждение',
                message: `Купить "${cardName}" за ${price} монет?`,
                buttons: [
                    {id: 'cancel', type: 'cancel', text: 'Отмена'},
                    {id: 'buy', type: 'default', text: 'Купить'}
                ]
            }, function(buttonId) {
                if (buttonId === 'buy') {
                    tg.sendData(JSON.stringify({
                        action: 'buy_card',
                        card_id: cardId,
                        price: price
                    }));
                }
            });
        }
        
        // Отображение карт
        function displayCards(cards) {
            const grid = document.getElementById('cardsGrid');
            if (!cards || cards.length === 0) {
                grid.innerHTML = '<div class="loading">😕 В магазине пока нет карт</div>';
                return;
            }
            
            grid.innerHTML = '';
            cards.forEach(card => {
                const div = document.createElement('div');
                div.className = 'card';
                div.onclick = () => buyCard(card.id, card.name, card.price);
                div.innerHTML = `
                    <img class="card-image" src="${card.image_url}" alt="${card.name}" onerror="this.src='https://via.placeholder.com/300x180?text=No+Image'">
                    <div class="card-info">
                        <div class="card-name">${escapeHtml(card.name)}</div>
                        <div class="card-rarity rarity-${card.rarity}">${card.rarity}</div>
                        <div class="card-description">${escapeHtml(card.description.substring(0, 80))}${card.description.length > 80 ? '...' : ''}</div>
                        <div class="card-price">💰 ${card.price} монет</div>
                        <button class="buy-button">Купить</button>
                    </div>
                `;
                grid.appendChild(div);
            });
            isLoading = false;
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Обработка входящих сообщений от бота
        tg.onEvent('viewportChanged', function() {
            tg.expand();
        });
        
        // Загружаем данные
        loadBalance();
        loadCards();
        
        // ВАЖНО: перехватываем ответы от бота через WebApp
        const originalSendData = tg.sendData;
        tg.sendData = function(data) {
            console.log("Sending:", data);
            originalSendData.call(tg, data);
        };
        
        // Сообщаем, что WebApp готов
        tg.ready();
    </script>
</body>
</html>
