<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Магазин карт</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        h1 {
            text-align: center;
            color: white;
            margin-bottom: 10px;
            font-size: 1.8em;
        }
        
        .update-info {
            text-align: center;
            color: rgba(255,255,255,0.9);
            margin-bottom: 20px;
            font-size: 0.85em;
        }
        
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 15px;
        }
        
        .card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .card:active {
            transform: scale(0.98);
        }
        
        .card-image {
            width: 100%;
            height: 160px;
            object-fit: cover;
            background: #ddd;
        }
        
        .card-info {
            padding: 12px;
        }
        
        .card-name {
            font-size: 1.1em;
            font-weight: bold;
            margin-bottom: 4px;
            color: #333;
        }
        
        .card-rarity {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.7em;
            font-weight: bold;
            margin-bottom: 8px;
        }
        
        .rarity-Common { background: #e0e0e0; color: #666; }
        .rarity-Uncommon { background: #4caf50; color: white; }
        .rarity-Rare { background: #2196f3; color: white; }
        .rarity-Epic { background: #9c27b0; color: white; }
        .rarity-Arcane { background: #ff9800; color: white; }
        .rarity-Legendary { background: #f44336; color: white; }
        .rarity-Mythic { background: #e91e63; color: white; }
        .rarity-Godest { background: linear-gradient(135deg, #ffd700, #ff8c00); color: white; }
        .rarity-Secret { background: #000; color: #ffd700; }
        
        .card-description {
            color: #666;
            font-size: 0.8em;
            margin-bottom: 8px;
            line-height: 1.3;
        }
        
        .card-price {
            font-size: 1em;
            font-weight: bold;
            color: #4caf50;
        }
        
        .buy-button {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 0.85em;
            cursor: pointer;
            width: 100%;
            margin-top: 8px;
        }
        
        .balance {
            position: fixed;
            bottom: 15px;
            right: 15px;
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.85em;
        }
        
        .loading {
            text-align: center;
            color: white;
            padding: 40px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🃏 Магазин карт</h1>
        <div class="update-info">📅 Обновляется раз в неделю | Нажмите на карту для покупки</div>
        <div class="cards-grid" id="cardsGrid">
            <div class="loading">🔄 Загрузка...</div>
        </div>
    </div>
    <div class="balance" id="balance">💰 ?</div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        
        // КАРТЫ (жестко зашиты в HTML - обновляйте вручную раз в неделю)
        const SHOP_CARDS = [
            {
                "id": "1",
                "name": "Лесной эльф",
                "description": "Маленький защитник леса, обладающий природной магией",
                "rarity": "Common",
                "image_url": "https://i.imgur.com/placeholder1.jpg",
                "price": 50
            },
            {
                "id": "2",
                "name": "Гоблин-разведчик",
                "description": "Быстрый и ловкий разведчик из подгорных племен",
                "rarity": "Common",
                "image_url": "https://i.imgur.com/placeholder2.jpg",
                "price": 50
            },
            {
                "id": "3",
                "name": "Огненный паук",
                "description": "Опасный паук, плетущий огненные сети",
                "rarity": "Common",
                "image_url": "https://i.imgur.com/placeholder3.jpg",
                "price": 50
            },
            {
                "id": "4",
                "name": "Ледяная фея",
                "description": "Крошечная фея, приносящая зимний холод",
                "rarity": "Common",
                "image_url": "https://i.imgur.com/placeholder4.jpg",
                "price": 50
            },
            {
                "id": "5",
                "name": "Каменный голем",
                "description": "Медлительный, но невероятно сильный страж",
                "rarity": "Common",
                "image_url": "https://i.imgur.com/placeholder5.jpg",
                "price": 50
            },
            {
                "id": "6",
                "name": "Дракон-малыш",
                "description": "Юный дракон, только начинающий учиться летать",
                "rarity": "Uncommon",
                "image_url": "https://i.imgur.com/placeholder6.jpg",
                "price": 100
            }
        ];
        
        // Отображение карт
        function displayCards() {
            const grid = document.getElementById('cardsGrid');
            grid.innerHTML = '';
            
            SHOP_CARDS.forEach(card => {
                const div = document.createElement('div');
                div.className = 'card';
                div.onclick = () => {
                    tg.showPopup({
                        title: 'Подтверждение покупки',
                        message: `Купить ${card.name} за ${card.price} монет?`,
                        buttons: [
                            {id: 'cancel', type: 'cancel', text: '❌ Отмена'},
                            {id: 'buy', type: 'default', text: '✅ Купить'}
                        ]
                    }, (buttonId) => {
                        if (buttonId === 'buy') {
                            // Отправляем запрос на покупку боту
                            tg.sendData(JSON.stringify({
                                action: 'buy_card',
                                card_id: card.id,
                                price: card.price,
                                card_name: card.name
                            }));
                            tg.close(); // Закрываем WebApp после покупки
                        }
                    });
                };
                
                div.innerHTML = `
                    <img class="card-image" src="${card.image_url}" alt="${card.name}" onerror="this.src='https://via.placeholder.com/300x160?text=No+Image'">
                    <div class="card-info">
                        <div class="card-name">${card.name}</div>
                        <div class="card-rarity rarity-${card.rarity}">${card.rarity}</div>
                        <div class="card-description">${card.description.substring(0, 80)}${card.description.length > 80 ? '...' : ''}</div>
                        <div class="card-price">💰 ${card.price} монет</div>
                        <button class="buy-button">Купить</button>
                    </div>
                `;
                grid.appendChild(div);
            });
        }
        
        // Запрашиваем баланс при открытии
        function loadBalance() {
            tg.sendData(JSON.stringify({action: 'get_balance'}));
        }
        
        // Обработка ответа от бота (только для баланса)
        tg.onEvent('mainButtonClicked', function() {});
        
        // Показываем карты сразу
        displayCards();
        
        // Запрашиваем баланс
        loadBalance();
        
        // Сообщаем, что готовы
        tg.ready();
    </script>
</body>
</html>
